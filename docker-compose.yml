# CRMForge — full stack (one command)
#
#   docker compose up -d --build
#   open http://localhost:5173          ← frontend
#   open http://localhost:3000/api/docs ← Swagger
#
# Logs: docker compose logs -f api
# Stop: docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: crmforge-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: crmforge
      POSTGRES_PASSWORD: crmforge
      POSTGRES_DB: crmforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U crmforge -d crmforge']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crmforge-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crmforge-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://crmforge:crmforge@postgres:5432/crmforge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://localhost:5173
      APP_URL: http://localhost:5173
      MAIL_MOCK: 'true'
      AMOCRM_MOCK: 'true'
      LOKI_URL: http://loki:3100
      LOKI_ENABLED: 'false'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: crmforge-web
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      api:
        condition: service_healthy

  loki:
    image: grafana/loki:3.0.0
    container_name: crmforge-loki
    restart: unless-stopped
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  grafana:
    image: grafana/grafana:11.0.0
    container_name: crmforge-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

volumes:
  postgres_data:
  redis_data:
  loki_data:
  grafana_data:
